<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Dynamics Calculator · v0.1</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;background:#f5f5f5;color:#1a1a1a}
header{background:#1a2332;color:#fff;padding:14px 20px;display:flex;align-items:baseline;gap:12px}
header h1{font-size:17px;font-weight:600}
header .sub{font-size:12px;color:#8ca0be}
main{display:grid;grid-template-columns:360px 1fr;gap:12px;padding:12px;min-height:calc(100vh - 48px)}
.panel{background:#fff;border:1px solid #dde2ea;border-radius:6px;padding:14px}
h2{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#555;margin-bottom:12px}
/* Input panel */
.tire-row{display:flex;gap:6px;margin-bottom:8px;align-items:center}
.tire-row input{width:70px;padding:5px 7px;border:1px solid #ccc;border-radius:4px;font-size:13px}
.tire-row .slash{color:#888;font-weight:bold}
.tire-row label{font-size:12px;color:#666;white-space:nowrap}
.add-row{display:grid;grid-template-columns:1fr 90px 80px auto;gap:6px;margin-bottom:10px}
select,input[type=number],input[type=text]{padding:5px 7px;border:1px solid #ccc;border-radius:4px;font-size:13px;width:100%}
select:focus,input:focus{outline:2px solid #2563eb;border-color:#2563eb}
button{padding:5px 12px;border:none;border-radius:4px;cursor:pointer;font-size:13px;font-weight:500}
.btn-add{background:#2563eb;color:#fff}
.btn-add:hover{background:#1d4ed8}
.btn-remove{background:none;color:#dc2626;padding:2px 6px;font-size:12px;border:1px solid #fca5a5;border-radius:3px}
.btn-remove:hover{background:#fef2f2}
.input-item{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;border:1px solid #e5e7eb;border-radius:4px;margin-bottom:4px;background:#fafafa}
.input-item .var-name{font-weight:600;font-size:12px;color:#1e40af}
.input-item .var-val{font-size:13px}
.input-item .var-sym{font-size:11px;color:#6b7280;margin-left:4px}
.divider{border:none;border-top:1px solid #e5e7eb;margin:10px 0}
.section-label{font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
/* Results panel */
.results-table{width:100%;border-collapse:collapse}
.results-table th{text-align:left;font-size:11px;color:#6b7280;font-weight:600;padding:4px 8px;border-bottom:2px solid #e5e7eb;text-transform:uppercase}
.results-table td{padding:6px 8px;border-bottom:1px solid #f0f0f0;font-size:13px;vertical-align:middle}
.results-table tr:last-child td{border-bottom:none}
.results-table tr:hover td{background:#f9fafb}
.val-primary{font-weight:600;font-size:14px}
.val-alt{font-size:11px;color:#6b7280}
.source-badge{font-size:10px;background:#eff6ff;color:#1e40af;padding:2px 6px;border-radius:10px;font-weight:600}
.user-badge{background:#f0fdf4;color:#166534}
.empty-state{text-align:center;color:#9ca3af;padding:30px 0;font-size:13px}
/* Details section */
#details{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 12px 12px}
.details-panel{background:#fff;border:1px solid #dde2ea;border-radius:6px;padding:14px}
.step-item{display:flex;gap:8px;align-items:flex-start;padding:5px 0;border-bottom:1px solid #f0f0f0;font-size:12px}
.step-item:last-child{border-bottom:none}
.step-fid{font-weight:700;color:#1e40af;min-width:40px}
.step-desc{color:#374151;line-height:1.4}
.warn-item{padding:6px 10px;border-radius:4px;margin-bottom:6px;font-size:12px;line-height:1.4}
.warn-conflict{background:#fef3c7;border-left:3px solid #f59e0b;color:#78350f}
.warn-range{background:#fff7ed;border-left:3px solid #f97316;color:#7c2d12}
.warn-info{background:#eff6ff;border-left:3px solid #3b82f6;color:#1e3a8a}
.missing-item{padding:5px 0;border-bottom:1px solid #f0f0f0;font-size:12px;color:#374151}
.missing-item:last-child{border-bottom:none}
.missing-need{font-weight:600;color:#dc2626}
.missing-would{color:#059669}
/* Conflict row highlight */
.conflict-row td{background:#fffbeb !important}
/* Responsive */
@media(max-width:720px){
  main{grid-template-columns:1fr}
  #details{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header>
  <h1>Vehicle Dynamics Calculator</h1>
  <span class="sub">v0.1 · Ch 2 Acceleration · P1-core (F201–F208)</span>
</header>

<main>
  <!-- LEFT: Inputs -->
  <div class="panel" id="left-panel">
    <h2>Known Values</h2>

    <!-- Tire code shortcut -->
    <div class="section-label">Tire Code (shortcut)</div>
    <div class="tire-row">
      <input type="number" id="tc-width" placeholder="225" title="Width mm">
      <span class="slash">/</span>
      <input type="number" id="tc-aspect" placeholder="55" title="Aspect %">
      <span class="slash">R</span>
      <input type="number" id="tc-rim" placeholder="17" title="Rim in">
      <button class="btn-add" onclick="parseTireCode()" style="white-space:nowrap">Add Tire</button>
    </div>
    <hr class="divider">

    <!-- Generic add row -->
    <div class="section-label">Add Any Variable</div>
    <div class="add-row">
      <select id="var-select" onchange="onVarSelect()">
        <option value="">— select variable —</option>
      </select>
      <input type="number" id="var-value" placeholder="value" step="any">
      <select id="unit-select"></select>
      <button class="btn-add" onclick="addInput()">Add</button>
    </div>

    <hr class="divider">
    <div class="section-label">Current Inputs</div>
    <div id="inputs-list"></div>
  </div>

  <!-- RIGHT: Results -->
  <div class="panel" id="right-panel">
    <h2>Computed Results</h2>
    <div id="results-content">
      <div class="empty-state">Add inputs on the left to begin solving.</div>
    </div>
  </div>
</main>

<div id="details">
  <div class="details-panel">
    <h2>Derivation Steps</h2>
    <div id="steps-content"><div class="empty-state" style="padding:10px 0">No steps yet.</div></div>
  </div>
  <div class="details-panel">
    <h2>Warnings &amp; Missing</h2>
    <div id="warn-content"></div>
    <div id="missing-content"></div>
  </div>
</div>

<script>
// ─── Constants ────────────────────────────────────────────────────────────────
const G = 9.80665; // m/s²

// ─── Unit conversion ─────────────────────────────────────────────────────────
// toSI: user input → SI (or variable's canonical internal unit)
// fromSI: SI → display unit
function toSI(value, unit) {
  switch (unit) {
    // Length → m
    case 'm':       return value;
    case 'in':      return value * 0.0254;
    case 'ft':      return value * 0.3048;
    case 'mm':      return value / 1000;
    // Force → N
    case 'N':       return value;
    case 'lb':      return value * 4.44822;
    // Velocity → m/s
    case 'm/s':     return value;
    case 'mph':     return value * 0.44704;
    case 'ft/s':    return value * 0.3048;
    // Angular velocity → rad/s
    case 'rad/s':   return value;
    case 'RPM':     return value * Math.PI / 30;
    // Torque → N·m
    case 'N·m':     return value;
    case 'ft·lb':   return value * 1.35582;
    // Power → W
    case 'W':       return value;
    case 'hp':      return value * 745.7;
    case 'kW':      return value * 1000;
    // Acceleration → m/s²
    case 'm/s²':    return value;
    case 'ft/s²':   return value * 0.3048;
    case 'g':       return value * G;
    // Angle → rad
    case 'rad':     return value;
    case 'deg':     return value * Math.PI / 180;
    case '% grade': return Math.atan(value / 100);
    // Stored in natural unit (tire spec)
    case 'mm_nat':  return value; // width stored as mm
    case '%_nat':   return value; // aspect stored as %
    case 'in_nat':  return value; // rim diameter stored as in
    // Dimensionless
    default:        return value;
  }
}

function fromSI(value, unit) {
  switch (unit) {
    case 'm':       return value;
    case 'in':      return value / 0.0254;
    case 'ft':      return value / 0.3048;
    case 'mm':      return value * 1000;
    case 'N':       return value;
    case 'lb':      return value / 4.44822;
    case 'm/s':     return value;
    case 'mph':     return value / 0.44704;
    case 'ft/s':    return value / 0.3048;
    case 'rad/s':   return value;
    case 'RPM':     return value * 30 / Math.PI;
    case 'N·m':     return value;
    case 'ft·lb':   return value / 1.35582;
    case 'W':       return value;
    case 'hp':      return value / 745.7;
    case 'kW':      return value / 1000;
    case 'm/s²':    return value;
    case 'ft/s²':   return value / 0.3048;
    case 'g':       return value / G;
    case 'rad':     return value;
    case 'deg':     return value * 180 / Math.PI;
    case '% grade': return Math.tan(value) * 100;
    default:        return value;
  }
}

function fmt(value, digits = 4) {
  if (!isFinite(value)) return 'N/A';
  const abs = Math.abs(value);
  if (abs === 0) return '0';
  if (abs < 0.001 || abs >= 1e6) return value.toExponential(3);
  if (abs < 1) return value.toPrecision(digits);
  return parseFloat(value.toFixed(digits > 3 ? 3 : digits)).toString();
}

// ─── Variable definitions ─────────────────────────────────────────────────────
// si_unit: internal storage unit
// input_units: [[unit, label]] — first is default
// display_units: [[unit, label]] — shown in results (first is primary)
// range: {min, max} in si_unit — for sanity check
const VARIABLES = {
  V221: {
    id:'V221', sym:'width', name:'Tire Section Width',
    si_unit:'mm_nat', input_units:[['mm_nat','mm']], display_units:[['mm_nat','mm']],
    range:{min:155,max:335}, note:'e.g. 225 in "225/55 R17"'
  },
  V222: {
    id:'V222', sym:'aspect', name:'Tire Aspect Ratio',
    si_unit:'%_nat', input_units:[['%_nat','%']], display_units:[['%_nat','%']],
    range:{min:30,max:80}, note:'e.g. 55 in "225/55 R17"'
  },
  V223: {
    id:'V223', sym:'rim', name:'Rim Diameter',
    si_unit:'in_nat', input_units:[['in_nat','in']], display_units:[['in_nat','in']],
    range:{min:14,max:22}, note:'e.g. 17 in "225/55 R17"'
  },
  V009: {
    id:'V009', sym:'r_w', name:'Tire Nominal Radius',
    si_unit:'m', input_units:[['in','in'],['m','m'],['ft','ft']], display_units:[['in','in'],['m','m']],
    range:{min:0.254,max:0.457}, note:'Nominal unloaded radius ≈ rolling radius (v0.1 approximation)'
  },
  V202: {
    id:'V202', sym:'N_tf', name:'Overall Gear Ratio',
    si_unit:'—', input_units:[['—','(dimensionless)']], display_units:[['—','']],
    range:{min:2.5,max:20}, note:'Total drivetrain ratio: N_T × N_F'
  },
  V204: {
    id:'V204', sym:'ω_e', name:'Engine Speed',
    si_unit:'rad/s', input_units:[['RPM','RPM'],['rad/s','rad/s']], display_units:[['RPM','RPM'],['rad/s','rad/s']],
    range:{min:62.8,max:837.8}, note:'600–8000 RPM for ICE; higher for EV'
  },
  V010: {
    id:'V010', sym:'V', name:'Vehicle Speed',
    si_unit:'m/s', input_units:[['mph','mph'],['m/s','m/s'],['ft/s','ft/s']], display_units:[['mph','mph'],['m/s','m/s']],
    range:{min:0,max:67.1}, note:'0–150 mph typical'
  },
  V201: {
    id:'V201', sym:'T_e', name:'Engine Torque',
    si_unit:'N·m', input_units:[['ft·lb','ft·lb'],['N·m','N·m']], display_units:[['ft·lb','ft·lb'],['N·m','N·m']],
    range:{min:67.8,max:1356}, note:'50–1000 ft·lb'
  },
  V203: {
    id:'V203', sym:'η_tf', name:'Drivetrain Efficiency',
    si_unit:'—', input_units:[['—','(0–1)']], display_units:[['—','']],
    range:{min:0.82,max:0.97}, note:'Typical 0.82–0.97'
  },
  V206: {
    id:'V206', sym:'P', name:'Engine Power',
    si_unit:'W', input_units:[['hp','hp'],['kW','kW'],['W','W']], display_units:[['hp','hp'],['kW','kW']],
    range:{min:37300,max:746000}, note:'50–1000 hp'
  },
  V207: {
    id:'V207', sym:'M_f', name:'Mass Factor',
    si_unit:'—', input_units:[['—','(dimensionless)']], display_units:[['—','']],
    range:{min:1.05,max:1.5}, note:'Drivetrain rotational inertia factor (empirical)'
  },
  V209: {
    id:'V209', sym:'F_x', name:'Tractive Force (engine-limited)',
    si_unit:'N', input_units:[['lb','lb'],['N','N']], display_units:[['lb','lb'],['N','N']],
    range:{min:0,max:44482}, note:'Engine-limited force at wheels'
  },
  V001: {
    id:'V001', sym:'W', name:'Vehicle Weight',
    si_unit:'N', input_units:[['lb','lb'],['N','N']], display_units:[['lb','lb'],['N','N']],
    range:{min:6672,max:35584}, note:'1500–8000 lb'
  },
  V011: {
    id:'V011', sym:'D_A', name:'Aerodynamic Drag',
    si_unit:'N', input_units:[['lb','lb'],['N','N']], display_units:[['lb','lb'],['N','N']],
    range:{min:0,max:1335}, note:'Optional — assumed 0 if omitted in F207'
  },
  V012: {
    id:'V012', sym:'R_x', name:'Rolling Resistance',
    si_unit:'N', input_units:[['lb','lb'],['N','N']], display_units:[['lb','lb'],['N','N']],
    range:{min:0,max:445}, note:'Optional — assumed 0 if omitted in F207'
  },
  V013: {
    id:'V013', sym:'θ', name:'Road Grade Angle',
    si_unit:'rad', input_units:[['% grade','% grade'],['deg','deg'],['rad','rad']], display_units:[['% grade','% grade'],['deg','deg']],
    range:{min:-0.149,max:0.149}, note:'Optional — assumed 0 (flat) if omitted in F207'
  },
  V101: {
    id:'V101', sym:'R_hx', name:'Hitch Horizontal Force',
    si_unit:'N', input_units:[['lb','lb'],['N','N']], display_units:[['lb','lb'],['N','N']],
    range:{min:0,max:22241}, note:'Optional — assumed 0 if omitted in F207'
  },
  V007: {
    id:'V007', sym:'a_x', name:'Longitudinal Acceleration',
    si_unit:'m/s²', input_units:[['g','g'],['m/s²','m/s²'],['ft/s²','ft/s²']], display_units:[['g','g'],['m/s²','m/s²'],['ft/s²','ft/s²']],
    range:{min:-11.77,max:4.9}, note:'−1.2 g to +0.5 g typical'
  },
};

// Variable display order in dropdown
const VAR_ORDER = [
  'V221','V222','V223',
  'V001','V009',
  'V201','V202','V203','V204','V206',
  'V010',
  'V011','V012','V013','V101',
  'V207','V209','V007',
];

// ─── Formula definitions ──────────────────────────────────────────────────────
// req: required inputs; opt: optional (default 0); out: outputs
const FORMULAS = [
  {
    id:'F201', name:'Tire Spec → Nominal Radius',
    req:['V221','V222','V223'], opt:[], out:['V009'],
    compute(k) {
      const w = k.V221.si;   // mm
      const a = k.V222.si;   // %
      const d = k.V223.si;   // in
      return { V009: (w * a / 100 / 1000) + (d * 0.0254 / 2) }; // m
    },
    display:'r_w [m] = (width[mm] × aspect%/100) / 1000 + rim[in] × 0.0254/2',
    source:'PDF p1, Ch2',
    note:'Nominal unloaded radius. v0.1 uses this as effective rolling radius.'
  },
  {
    id:'F202', name:'Vehicle Speed (from engine speed)',
    req:['V009','V204','V202'], opt:[], out:['V010'],
    compute(k) {
      return { V010: k.V009.si * k.V204.si / k.V202.si }; // m/s
    },
    display:'V = r_w × ω_e / N_tf',
    source:'PDF p1, Ch2'
  },
  {
    id:'F203', name:'Engine Speed (from vehicle speed)',
    req:['V010','V202','V009'], opt:[], out:['V204'],
    compute(k) {
      return { V204: k.V010.si * k.V202.si / k.V009.si }; // rad/s
    },
    display:'ω_e = V × N_tf / r_w',
    source:'PDF p1, Ch2'
  },
  {
    id:'F204', name:'Engine Power',
    req:['V201','V204'], opt:[], out:['V206'],
    compute(k) {
      return { V206: k.V201.si * k.V204.si }; // W
    },
    display:'P [W] = T_e [N·m] × ω_e [rad/s]',
    source:'PDF p1, Ch2'
  },
  {
    id:'F205', name:'Tractive Force (engine-limited)',
    req:['V201','V202','V203','V009'], opt:[], out:['V209'],
    compute(k) {
      return { V209: k.V201.si * k.V202.si * k.V203.si / k.V009.si }; // N
    },
    display:'F_x = T_e × N_tf × η_tf / r_w',
    source:'PDF p1, Ch2'
  },
  {
    id:'F206', name:'Mass Factor',
    req:['V202'], opt:[], out:['V207'],
    compute(k) {
      const n = k.V202.si;
      return { V207: 1 + 0.04*n + 0.0025*n*n };
    },
    display:'M_f = 1 + 0.04·N_tf + 0.0025·N_tf²',
    source:'PDF p1, Ch2',
    note:'Empirical; accounts for drivetrain rotational inertia'
  },
  {
    id:'F207', name:'Acceleration (engine-limited)',
    req:['V209','V207','V001'], opt:['V011','V012','V013','V101'], out:['V007'],
    compute(k) {
      const Fx   = k.V209.si;
      const Mf   = k.V207.si;
      const W    = k.V001.si;              // N
      const DA   = k.V011 ? k.V011.si : 0;
      const Rx   = k.V012 ? k.V012.si : 0;
      const th   = k.V013 ? k.V013.si : 0; // rad
      const Rhx  = k.V101 ? k.V101.si : 0;
      const M    = W / G;                  // kg
      return { V007: (Fx - DA - Rx - W*Math.sin(th) - Rhx) / (Mf * M) };
    },
    display:'a_x = (F_x − D_A − R_x − W·sinθ − R_hx) / (M_f · W/g)',
    source:'PDF p1, Ch2',
    note:'D_A, R_x, θ, R_hx default to 0 if not provided. Simplified flat/no-drag form: a_x/g = F_x/(M_f·W)'
  },
  {
    id:'F208', name:'Acceleration (constant power, ideal)',
    req:['V206','V010','V001'], opt:[], out:['V007'],
    compute(k) {
      const P = k.V206.si;
      const V = k.V010.si;
      const M = k.V001.si / G;
      if (V <= 0) return null;
      return { V007: P / (M * V) };
    },
    display:'a_x = P / (M · V) [SI]   ≡   550·g·HP / (W·V) [US]',
    source:'PDF p1, Ch2',
    note:'Assumes constant power. Real vehicles are torque-limited at low speed.'
  },
];

// Formula output → formula(s) that produce it (for conflict detection)
const OUT_MAP = {}; // varId → [formulaId]
for (const f of FORMULAS) {
  for (const o of f.out) {
    if (!OUT_MAP[o]) OUT_MAP[o] = [];
    OUT_MAP[o].push(f.id);
  }
}

// ─── Solver ───────────────────────────────────────────────────────────────────
function solve(userInputs) {
  // known: { varId: { si, source, displayVal, displayUnit } }
  const known = {};
  for (const [id, entry] of Object.entries(userInputs)) {
    known[id] = { si: entry.si, source: 'user', displayVal: entry.displayVal, displayUnit: entry.displayUnit };
  }

  const steps = [];
  const warnings = [];
  const seenConflicts = new Set(); // prevent duplicate warnings across while-loop iterations
  // allPaths: { varId: { formulaId: siValue } }
  const allPaths = {};

  let changed = true;
  while (changed) {
    changed = false;
    for (const f of FORMULAS) {
      // Check required inputs
      if (!f.req.every(id => id in known)) continue;

      let result;
      try { result = f.compute(known); } catch(e) { continue; }
      if (!result) continue;

      for (const [id, si] of Object.entries(result)) {
        if (!isFinite(si)) continue;

        if (!allPaths[id]) allPaths[id] = {};
        allPaths[id][f.id] = si;

        if (id in known) {
          // Already known — conflict check (deduplicated across while-loop iterations)
          if (known[id].source !== f.id) {
            const conflictKey = `${id}:${known[id].source}:${f.id}`;
            if (!seenConflicts.has(conflictKey)) {
              seenConflicts.add(conflictKey);
              const existing = known[id].si;
              const denom = Math.abs(existing) + 1e-12;
              const diff = Math.abs(si - existing) / denom;
              if (diff > 0.001) {
                warnings.push({
                  type:'conflict',
                  varId: id,
                  f1: known[id].source, v1: existing,
                  f2: f.id,            v2: si,
                  pct: (diff*100).toFixed(2)
                });
              }
            }
          }
        } else {
          known[id] = { si, source: f.id };
          steps.push({ fid: f.id, fname: f.name, varId: id });
          changed = true;
        }
      }
    }
  }

  // Sanity checks on all known values
  for (const [id, entry] of Object.entries(known)) {
    const def = VARIABLES[id];
    if (!def || !def.range) continue;
    const { min, max } = def.range;
    if (entry.si < min || entry.si > max) {
      // For user inputs, flag as possible error; for computed, flag as info
      warnings.push({
        type: entry.source === 'user' ? 'range_user' : 'range_computed',
        varId: id,
        si: entry.si,
        min, max
      });
    }
  }

  // Find formulas that almost fired (missing 1 input)
  const missing = [];
  for (const f of FORMULAS) {
    const missingReq = f.req.filter(id => !(id in known));
    if (missingReq.length > 0) {
      const haveReq = f.req.filter(id => id in known);
      if (haveReq.length > 0 || f.req.length <= 2) {
        // Show if we have at least one required input, or formula is small
        missing.push({ fid:f.id, fname:f.name, out:f.out, need:missingReq, have:haveReq });
      }
    }
  }

  return { known, steps, warnings, missing, allPaths };
}

// ─── UI State ─────────────────────────────────────────────────────────────────
const state = {
  inputs: {}, // { varId: { si, displayVal, displayUnit } }
};

// ─── UI Helpers ───────────────────────────────────────────────────────────────
function varLabel(id) {
  const d = VARIABLES[id];
  return d ? `${d.sym} — ${d.name}` : id;
}

function multiDisplay(si, varId) {
  const def = VARIABLES[varId];
  if (!def) return `${fmt(si)}`;
  return def.display_units.map(([u,label], i) => {
    const v = fromSI(si, u === 'mm_nat' ? 'mm' : u === '%_nat' ? '%' : u === 'in_nat' ? 'in' : u);
    return `${fmt(v)} ${label}`;
  }).join(' / ');
}

// ─── Populate dropdown ────────────────────────────────────────────────────────
function populateVarSelect() {
  const sel = document.getElementById('var-select');
  for (const id of VAR_ORDER) {
    const def = VARIABLES[id];
    if (!def) continue;
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = `${def.sym} · ${def.name}`;
    sel.appendChild(opt);
  }
}

function onVarSelect() {
  const id = document.getElementById('var-select').value;
  const uSel = document.getElementById('unit-select');
  uSel.innerHTML = '';
  if (!id || !VARIABLES[id]) return;
  const def = VARIABLES[id];
  for (const [u, label] of def.input_units) {
    const opt = document.createElement('option');
    opt.value = u;
    opt.textContent = label || u;
    uSel.appendChild(opt);
  }
}

// ─── Add input ────────────────────────────────────────────────────────────────
function addInputEntry(varId, rawValue, unit) {
  const def = VARIABLES[varId];
  if (!def) return false;
  const si = toSI(rawValue, unit);
  if (!isFinite(si)) { alert('Invalid value'); return false; }

  // Convert display unit name for natural units
  const displayUnit = unit === 'mm_nat' ? 'mm' : unit === '%_nat' ? '%' : unit === 'in_nat' ? 'in' : unit;

  state.inputs[varId] = { si, displayVal: rawValue, displayUnit };
  render();
  return true;
}

function addInput() {
  const varId = document.getElementById('var-select').value;
  const rawVal = parseFloat(document.getElementById('var-value').value);
  const unit   = document.getElementById('unit-select').value;
  if (!varId) { alert('Select a variable'); return; }
  if (isNaN(rawVal)) { alert('Enter a numeric value'); return; }
  if (addInputEntry(varId, rawVal, unit)) {
    document.getElementById('var-value').value = '';
  }
}

function parseTireCode() {
  const w = parseFloat(document.getElementById('tc-width').value);
  const a = parseFloat(document.getElementById('tc-aspect').value);
  const r = parseFloat(document.getElementById('tc-rim').value);
  if (isNaN(w)||isNaN(a)||isNaN(r)) { alert('Fill in all three tire fields'); return; }
  if (w<155||w>335) { alert(`Width ${w} mm seems outside 155–335 mm range`); }
  if (a<30||a>80)   { alert(`Aspect ${a}% seems outside 30–80% range`); }
  if (r<14||r>22)   { alert(`Rim ${r} in seems outside 14–22 in range`); }
  addInputEntry('V221', w, 'mm_nat');
  addInputEntry('V222', a, '%_nat');
  addInputEntry('V223', r, 'in_nat');
}

function removeInput(varId) {
  delete state.inputs[varId];
  render();
}

// ─── Main render ─────────────────────────────────────────────────────────────
function render() {
  renderInputsList();
  const { known, steps, warnings, missing } = solve(state.inputs);
  renderResults(known);
  renderSteps(steps);
  renderWarnings(warnings, missing);
}

function renderInputsList() {
  const el = document.getElementById('inputs-list');
  if (Object.keys(state.inputs).length === 0) {
    el.innerHTML = '<div class="empty-state" style="padding:8px 0;text-align:left;color:#9ca3af">No inputs added yet.</div>';
    return;
  }
  el.innerHTML = '';
  for (const [id, entry] of Object.entries(state.inputs)) {
    const def = VARIABLES[id];
    const div = document.createElement('div');
    div.className = 'input-item';
    div.innerHTML = `
      <div>
        <span class="var-name">${def ? def.sym : id}</span>
        <span class="var-val">${fmt(entry.displayVal)} ${entry.displayUnit}</span>
        <span class="var-sym">${def ? def.name : ''}</span>
      </div>
      <button class="btn-remove" onclick="removeInput('${id}')">✕</button>
    `;
    el.appendChild(div);
  }
}

function renderResults(known) {
  const el = document.getElementById('results-content');
  // Separate user inputs from computed
  const computed = Object.entries(known).filter(([id, e]) => e.source !== 'user');
  const userVars = Object.entries(known).filter(([id, e]) => e.source === 'user');

  if (computed.length === 0) {
    el.innerHTML = '<div class="empty-state">No values computed yet.<br>Try adding tire specs + gear ratio + engine torque.</div>';
    return;
  }

  let html = '<table class="results-table"><thead><tr><th>Variable</th><th>Value</th><th>Source</th></tr></thead><tbody>';

  // Computed results first
  for (const [id, entry] of computed) {
    const def = VARIABLES[id];
    const primary = def ? def.display_units[0] : null;
    const primaryU = primary ? (primary[0] === 'mm_nat' ? 'mm' : primary[0] === '%_nat' ? '%' : primary[0] === 'in_nat' ? 'in' : primary[0]) : '?';
    const primaryV = fmt(fromSI(entry.si, primaryU));
    const altUnits = def ? def.display_units.slice(1).map(([u,l]) => {
      const uc = u === 'mm_nat' ? 'mm' : u === '%_nat' ? '%' : u === 'in_nat' ? 'in' : u;
      return `${fmt(fromSI(entry.si, uc))} ${l}`;
    }).join(' / ') : '';

    html += `<tr>
      <td><strong>${def ? def.sym : id}</strong><br><span style="font-size:11px;color:#6b7280">${def ? def.name : id}</span></td>
      <td>
        <div class="val-primary">${primaryV} <span style="font-weight:400">${primaryU !== '—' ? primaryU : ''}</span></div>
        ${altUnits ? `<div class="val-alt">${altUnits}</div>` : ''}
      </td>
      <td><span class="source-badge">${entry.source}</span></td>
    </tr>`;
  }

  html += '</tbody></table>';
  el.innerHTML = html;
}

function renderSteps(steps) {
  const el = document.getElementById('steps-content');
  if (steps.length === 0) {
    el.innerHTML = '<div class="empty-state" style="padding:8px 0">No steps yet.</div>';
    return;
  }
  let html = '';
  for (const s of steps) {
    const def = VARIABLES[s.varId];
    html += `<div class="step-item">
      <span class="step-fid">${s.fid}</span>
      <span class="step-desc">computed <strong>${def ? def.sym : s.varId}</strong> (${def ? def.name : s.varId}) — ${s.fname}</span>
    </div>`;
  }
  el.innerHTML = html;
}

function renderWarnings(warnings, missing) {
  const wEl = document.getElementById('warn-content');
  const mEl = document.getElementById('missing-content');

  // Warnings
  let wHtml = '';
  for (const w of warnings) {
    if (w.type === 'conflict') {
      const def = VARIABLES[w.varId];
      wHtml += `<div class="warn-item warn-conflict">
        ⚠️ <strong>Conflict on ${def ? def.sym : w.varId}:</strong>
        ${w.f1} gives ${fmt(w.v1)} vs ${w.f2} gives ${fmt(w.v2)} (${w.pct}% diff)
      </div>`;
    } else if (w.type === 'range_user') {
      const def = VARIABLES[w.varId];
      wHtml += `<div class="warn-item warn-range">
        ⚠️ <strong>${def ? def.sym : w.varId}</strong> = ${fmt(fromSI(w.si, def ? def.display_units[0][0] : '—'))} is outside expected range
        [${fmt(w.min)}, ${fmt(w.max)}] ${def ? def.display_units[0][1] : ''}
        — verify units and value.
      </div>`;
    } else if (w.type === 'range_computed') {
      const def = VARIABLES[w.varId];
      wHtml += `<div class="warn-item warn-info">
        ℹ️ Computed <strong>${def ? def.sym : w.varId}</strong> is outside typical range — check inputs.
      </div>`;
    }
  }
  if (!wHtml && warnings.length === 0) {
    wHtml = '<div style="font-size:12px;color:#6b7280;margin-bottom:8px">No warnings.</div>';
  }
  wEl.innerHTML = wHtml;

  // Missing conditions
  let mHtml = '<div class="section-label" style="margin-top:8px">Could also compute</div>';
  const shown = missing.filter(m => m.need.length <= 3);
  if (shown.length === 0) {
    mHtml += '<div style="font-size:12px;color:#6b7280">All reachable formulas fired.</div>';
  } else {
    for (const m of shown) {
      const needNames = m.need.map(id => {
        const d = VARIABLES[id]; return d ? d.sym : id;
      }).join(', ');
      const outNames = m.out.map(id => {
        const d = VARIABLES[id]; return d ? d.sym : id;
      }).join(', ');
      mHtml += `<div class="missing-item">
        <span class="missing-fid" style="font-size:10px;color:#6b7280">${m.fid} · ${m.fname}</span><br>
        → <span class="missing-would">${outNames}</span>
        &nbsp;needs: <span class="missing-need">${needNames}</span>
      </div>`;
    }
  }
  mEl.innerHTML = mHtml;
}

// ─── Init ─────────────────────────────────────────────────────────────────────
populateVarSelect();
onVarSelect();
render();
</script>
</body>
</html>
